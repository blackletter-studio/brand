  <defs>
    <style>
      .blw-body { font-family: "Fraunces", "Cormorant Garamond", Georgia, serif; font-size: 86px; font-variation-settings: "opsz" 144, "wght" 400; letter-spacing: -0.02em; fill: #1a1a1a; }
